services:
  db:
    image: postgres:17-alpine
    container_name: dorm-system-db
    environment:
      POSTGRES_DB: dorm_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: NewPassword1234
    volumes:
      - dorm_system_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dorm_system"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dorm-system-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: dorm_system
      DB_USERNAME: postgres
      DB_PASSWORD: NewPassword1234
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-post-images}
      SUPABASE_STORAGE_FOLDER: ${SUPABASE_STORAGE_FOLDER:-posts}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_TEST_CONNECTION: ${MAIL_TEST_CONNECTION:-false}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_SMTP_SSL_ENABLE: ${MAIL_SMTP_SSL_ENABLE:-false}
      MAIL_SMTP_CONNECTION_TIMEOUT: ${MAIL_SMTP_CONNECTION_TIMEOUT:-5000}
      MAIL_SMTP_TIMEOUT: ${MAIL_SMTP_TIMEOUT:-5000}
      MAIL_SMTP_WRITE_TIMEOUT: ${MAIL_SMTP_WRITE_TIMEOUT:-5000}
      LEAD_ADMIN_EMAIL: lead.admin@sdu.kz
      LEAD_ADMIN_PASSWORD: LeadAdmin123!
      LEAD_ADMIN_NAME: Lead
      LEAD_ADMIN_SURNAME: Admin
      BOYS_ADMIN_EMAIL: boys.admin@sdu.kz
      BOYS_ADMIN_PASSWORD: BoysAdmin123!
      BOYS_ADMIN_NAME: Boys
      BOYS_ADMIN_SURNAME: Admin
      GIRLS_ADMIN_EMAIL: girls.admin@sdu.kz
      GIRLS_ADMIN_PASSWORD: GirlsAdmin123!
      GIRLS_ADMIN_NAME: Girls
      GIRLS_ADMIN_SURNAME: Admin
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  dorm_system_postgres_data:
